<!DOCTYPE html>
<html>
<head>
    <title>Waste Detection Dashboard</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            margin:30px;
        }

        h1{
            text-align:center;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th, td{
            border:1px solid #000;
            padding:10px;
            text-align:center;
        }

        th{
            background:#f2f2f2;
        }

        img{
            width:120px;
            height:auto;
        }

    </style>
</head>
<body>

<h1>Waste Detection Dashboard</h1>

<table>

<tr>
    <th>ID</th>
    <th>Detected Image</th>
    <th>Category</th>
    <th>Confidence</th>
    <th>Date & Time</th>
</tr>

{% for row in detections %}

<tr>

    <td>{{ row[0] }}</td>

    <td>
        <img
        src="{{ url_for('static',
        filename='detections/' + row[1]) }}"
        alt="Detection Image">
    </td>

    <td>{{ row[2] }}</td>

    <td>
        {{ "%.2f"|format(row[3] * 100) }}%
    </td>

    <td>{{ row[4] }}</td>

</tr>

{% endfor %}

</table>

</body>
</html>
