<!DOCTYPE html>
<html>

<head>
    <title>Waste Detection</title>
</head>

<body>

<h1>Waste Detection System</h1>

<!-- Live camera preview -->
<img 
    id="video" 
    width="700" 
    src="http://192.168.1.2:8080/video"
    style="border:1px solid black;"
>

<br><br>

<button onclick="captureNow()">
    Manual Capture
</button>

<button onclick="captureAfter10Seconds()">
    Capture After 10 Seconds
</button>

<p id="status"></p>

<h2>Detection Result</h2>

<img id="resultImage" width="700" style="border:1px solid black;">

<script>

// send image to Flask
function sendImage(blob) {

    fetch("/upload", {
        method: "POST",
        body: blob
    })
    .then(response => response.text())
    .then(data => {

        document.getElementById("status").innerHTML = data;

        document.getElementById("resultImage").src =
        "/result?t=" + new Date().getTime();

    })
    .catch(err => {
        console.error(err);
        document.getElementById("status").innerHTML = "Upload failed";
    });
}

// capture using Flask proxy
function captureNow() {

    const status = document.getElementById("status");
    status.innerHTML = "Capturing...";

    fetch("/capture-phone")
    .then(res => res.blob())
    .then(blob => {

        sendImage(blob);

    })
    .catch(err => {
        console.error(err);
        status.innerHTML = "Capture failed";
    });
}

// timer capture
function captureAfter10Seconds() {

    let seconds = 10;
    const status = document.getElementById("status");

    const timer = setInterval(() => {

        status.innerHTML = "Capturing in " + seconds + " seconds...";
        seconds--;

        if (seconds < 0) {
            clearInterval(timer);
            captureNow();
        }

    }, 1000);
}

</script>

</body>

</html>
